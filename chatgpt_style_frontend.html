<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutual Fund AI Assistant - Chat Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1a1a1a;
            color: #e4e4e4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2d2d2d;
            padding: 1rem 2rem;
            border-bottom: 1px solid #3d3d3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
        }

        .ai-badge {
            background: linear-gradient(45deg, #10a37f, #1e40af);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status.connected {
            background: #10a37f;
            color: white;
        }

        .status.error {
            background: #dc2626;
            color: white;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 0 1rem;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 100%;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message.ai {
            flex-direction: row;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .avatar.user {
            background: #3b82f6;
            color: white;
        }

        .avatar.ai {
            background: linear-gradient(45deg, #10a37f, #1e40af);
            color: white;
        }

        .message-content {
            flex: 1;
            max-width: 70%;
            min-width: 0;
        }

        .message.user .message-content {
            display: flex;
            justify-content: flex-end;
        }

        .message.ai .message-content {
            display: flex;
            justify-content: flex-start;
        }

        .message-bubble {
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .message.user .message-bubble {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .message.ai .message-bubble {
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-bottom-left-radius: 0.25rem;
        }

        .message-meta {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .message.ai .message-meta {
            justify-content: flex-start;
        }

        .message.user .message-meta {
            justify-content: flex-end;
        }

        .confidence-badge {
            background: #10a37f;
            color: white;
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.625rem;
            font-weight: 500;
        }

        .response-time {
            color: #6b7280;
        }

        .input-container {
            background: #2d2d2d;
            border-top: 1px solid #3d3d3d;
            padding: 1rem;
        }

        .input-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #e4e4e4;
            font-size: 1rem;
            resize: none;
            min-height: 2.5rem;
            max-height: 8rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-box:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .input-box::placeholder {
            color: #6b7280;
        }

        .send-button {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .send-button:hover:not(:disabled) {
            background: #2563eb;
        }

        .send-button:disabled {
            background: #374151;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            color: #9ca3af;
            font-style: italic;
        }

        .typing-dots {
            display: flex;
            gap: 0.25rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #6b7280;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .examples-section {
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .examples-title {
            font-size: 0.875rem;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .example-chip {
            background: #374151;
            color: #d1d5db;
            padding: 0.5rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #4b5563;
        }

        .example-chip:hover {
            background: #4b5563;
            border-color: #6b7280;
            transform: translateY(-1px);
        }

        .clear-button {
            background: #374151;
            color: #d1d5db;
            border: 1px solid #4b5563;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-button:hover {
            background: #4b5563;
            border-color: #6b7280;
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .message-content {
                max-width: 85%;
            }

            .input-wrapper {
                padding: 0 0.5rem;
            }

            .example-chips {
                gap: 0.375rem;
            }

            .example-chip {
                font-size: 0.75rem;
                padding: 0.375rem 0.625rem;
            }
        }

        .scrollbar-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scrollbar-custom::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }

        .scrollbar-custom::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>🤖 Mutual Fund AI Assistant</h1>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="ai-badge">Powered by Groq AI</div>
            <div id="status" class="status">Checking connection...</div>
            <button class="clear-button" onclick="clearChat()">Clear Chat</button>
        </div>
    </header>

    <div class="chat-container">
        <div class="examples-section" id="examplesSection">
            <div class="examples-title">💡 Example Questions</div>
            <div class="example-chips" id="exampleChips">
                <!-- Examples will be populated here -->
            </div>
        </div>

        <div class="messages-container scrollbar-custom" id="messagesContainer">
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <span>AI is thinking...</span>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="messageInput" 
                    class="input-box" 
                    placeholder="Ask about HDFC Mutual Funds..."
                    rows="1"
                    onkeypress="handleKeyPress(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button id="sendButton" class="send-button" onclick="sendMessage()">
                    <span>Send</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9 4 20 7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000';
        let conversationHistory = [];
        let isProcessing = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkAPIHealth();
            loadExamples();
            loadConversationHistory();
            autoResize(document.getElementById('messageInput'));
        });

        // Auto-resize textarea
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 128) + 'px';
        }

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Check API health
        async function checkAPIHealth() {
            const statusElement = document.getElementById('status');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    statusElement.className = 'status connected';
                    statusElement.textContent = `🤖 ${data.ai_model} Connected`;
                    return true;
                } else {
                    throw new Error('API not responding correctly');
                }
            } catch (error) {
                statusElement.className = 'status error';
                statusElement.textContent = '❌ API Not Connected';
                return false;
            }
        }

        // Load examples
        async function loadExamples() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/examples`);
                if (response.ok) {
                    const data = await response.json();
                    const examples = data.examples || [];
                    
                    const exampleChips = document.getElementById('exampleChips');
                    exampleChips.innerHTML = '';
                    
                    examples.forEach(example => {
                        const chip = document.createElement('div');
                        chip.className = 'example-chip';
                        chip.textContent = example.query;
                        chip.onclick = () => setQuery(example.query);
                        exampleChips.appendChild(chip);
                    });
                }
            } catch (error) {
                console.error('Error loading examples:', error);
            }
        }

        // Set query input
        function setQuery(query) {
            const input = document.getElementById('messageInput');
            input.value = query;
            autoResize(input);
            input.focus();
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;

            isProcessing = true;
            updateSendButton(false);

            // Add user message
            addMessage('user', message);
            input.value = '';
            autoResize(input);

            // Show typing indicator
            showTypingIndicator(true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/v1/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: message })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                showTypingIndicator(false);
                addMessage('ai', data.answer, data);
                
            } catch (error) {
                console.error('Error:', error);
                showTypingIndicator(false);
                addMessage('ai', `❌ Error: ${error.message}`);
            } finally {
                isProcessing = false;
                updateSendButton(true);
            }
        }

        // Add message to chat
        function addMessage(type, content, metadata = null) {
            const messagesContainer = document.getElementById('messagesContainer');
            const typingIndicator = document.getElementById('typingIndicator');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${type}`;
            avatar.textContent = type === 'user' ? 'U' : 'AI';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            
            messageContent.appendChild(bubble);
            
            // Add metadata for AI messages
            if (type === 'ai' && metadata) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';
                
                const confidence = metadata.confidence ? 
                    `<span class="confidence-badge">${Math.round(metadata.confidence * 100)}% confident</span>` : '';
                const responseTime = metadata.response_time ? 
                    `<span class="response-time">${metadata.response_time.toFixed(2)}s</span>` : '';
                
                metaDiv.innerHTML = `${confidence} ${responseTime}`;
                messageContent.appendChild(metaDiv);
            }
            
            // Add timestamp for user messages
            if (type === 'user') {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';
                metaDiv.innerHTML = `<span class="response-time">${new Date().toLocaleTimeString()}</span>`;
                messageContent.appendChild(metaDiv);
            }
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);
            
            // Insert before typing indicator
            messagesContainer.insertBefore(messageDiv, typingIndicator);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Save to conversation history
            conversationHistory.push({ type, content, metadata, timestamp: new Date().toISOString() });
            saveConversationHistory();
        }

        // Show/hide typing indicator
        function showTypingIndicator(show) {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = show ? 'flex' : 'none';
            if (show) {
                const messagesContainer = document.getElementById('messagesContainer');
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        }

        // Update send button state
        function updateSendButton(enabled) {
            const button = document.getElementById('sendButton');
            button.disabled = !enabled;
        }

        // Clear chat
        function clearChat() {
            if (confirm('Are you sure you want to clear the entire conversation?')) {
                conversationHistory = [];
                saveConversationHistory();
                
                const messagesContainer = document.getElementById('messagesContainer');
                const typingIndicator = document.getElementById('typingIndicator');
                messagesContainer.innerHTML = '';
                messagesContainer.appendChild(typingIndicator);
            }
        }

        // Save conversation history
        function saveConversationHistory() {
            try {
                localStorage.setItem('chatHistory', JSON.stringify(conversationHistory));
            } catch (error) {
                console.error('Error saving conversation history:', error);
            }
        }

        // Load conversation history
        function loadConversationHistory() {
            try {
                const saved = localStorage.getItem('chatHistory');
                if (saved) {
                    conversationHistory = JSON.parse(saved);
                    conversationHistory.forEach(item => {
                        addMessage(item.type, item.content, item.metadata);
                    });
                }
            } catch (error) {
                console.error('Error loading conversation history:', error);
            }
        }
    </script>
</body>
</html>
