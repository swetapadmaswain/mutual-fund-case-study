name: Mutual Fund Data Update Pipeline

on:
  schedule:
    # Run daily at 2:00 AM IST (8:30 PM UTC previous day)
    - cron: '30 20 * * *'
  
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update to perform'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - incremental
          - embeddings_only
          - validation_only
      force_update:
        description: 'Force update even if no changes detected'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.9'
  NODE_VERSION: '18'

jobs:
  setup-and-check:
    name: Setup Environment and Check for Changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
      update_type: ${{ steps.changes.outputs.update_type }}
      should_run: ${{ steps.decision.outputs.should_run }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests beautifulsoup4 schedule

      - name: Check for data changes
        id: changes
        run: |
          python scripts/check_data_changes.py --type ${{ github.event.inputs.update_type || 'full' }}
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "update_type=${{ github.event.inputs.update_type || 'full' }}" >> $GITHUB_OUTPUT

      - name: Decide whether to run full pipeline
        id: decision
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ] || [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  data-collection:
    name: Data Collection and Processing
    runs-on: ubuntu-latest
    needs: setup-and-check
    if: needs.setup-and-check.outputs.should_run == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/sentence_transformers
          key: ${{ runner.os }}-deps-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests beautifulsoup4 selenium webdriver-manager

      - name: Set up Chrome for scraping
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: latest

      - name: Run Data Collection (Phase 1)
        run: |
          python -m src.data_collection.main --update-type ${{ needs.setup-and-check.outputs.update_type }}
        env:
          GITHUB_ACTIONS: true
          SCRAPE_DELAY: 2
          MAX_RETRIES: 3

      - name: Validate collected data
        run: |
          python scripts/validate_data.py --phase data_collection

      - name: Upload data artifacts
        uses: actions/upload-artifact@v3
        with:
          name: collected-data
          path: |
            data/raw/
            data/processed/
            cache/phase1_results/
          retention-days: 7

  document-processing:
    name: Document Processing and Chunking
    runs-on: ubuntu-latest
    needs: [setup-and-check, data-collection]
    if: needs.setup-and-check.outputs.should_run == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download data artifacts
        uses: actions/download-artifact@v3
        with:
          name: collected-data
          path: ./

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Document Processing (Phase 2.1)
        run: |
          python -m src.rag.chunking.main --update-type ${{ needs.setup-and-check.outputs.update_type }}

      - name: Validate chunked data
        run: |
          python scripts/validate_data.py --phase chunking

      - name: Upload chunk artifacts
        uses: actions/upload-artifact@v3
        with:
          name: chunked-data
          path: |
            cache/phase2_1_results/
            data/documents/
          retention-days: 7

  vector-store-update:
    name: Vector Store and Embedding Update
    runs-on: ubuntu-latest
    needs: [setup-and-check, document-processing]
    if: needs.setup-and-check.outputs.should_run == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download chunk artifacts
        uses: actions/download-artifact@v3
        with:
          name: chunked-data
          path: ./

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Vector Store Update (Phase 2.2)
        run: |
          python -m src.rag.vector_store.main --update-type ${{ needs.setup-and-check.outputs.update_type }}

      - name: Validate vector store
        run: |
          python scripts/validate_data.py --phase vector_store

      - name: Upload vector store artifacts
        uses: actions/upload-artifact@v3
        with:
          name: vector-store
          path: |
            cache/vector_db/
            cache/phase2_2_results/
          retention-days: 7

  retrieval-system-update:
    name: Retrieval System Validation
    runs-on: ubuntu-latest
    needs: [setup-and-check, vector-store-update]
    if: needs.setup-and-check.outputs.should_run == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download vector store artifacts
        uses: actions/download-artifact@v3
        with:
          name: vector-store
          path: ./

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Retrieval System Validation (Phase 2.3)
        run: |
          python -m src.rag.retrieval.main --validation-mode

      - name: Validate retrieval performance
        run: |
          python scripts/validate_data.py --phase retrieval

      - name: Upload retrieval artifacts
        uses: actions/upload-artifact@v3
        with:
          name: retrieval-system
          path: |
            cache/phase2_3_results/
            tests/retrieval_performance.json
          retention-days: 7

  integration-testing:
    name: End-to-End Integration Testing
    runs-on: ubuntu-latest
    needs: [setup-and-check, retrieval-system-update]
    if: needs.setup-and-check.outputs.should_run == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          pattern: "*"
          merge-multiple: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run comprehensive tests
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Run performance benchmarks
        run: |
          python scripts/run_performance_tests.py

      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            test-results.xml
            performance_reports/
          retention-days: 30

      - name: Generate update report
        run: |
          python scripts/generate_update_report.py

      - name: Upload update report
        uses: actions/upload-artifact@v3
        with:
          name: update-report
          path: update_report_*.md
          retention-days: 30

  commit-and-deploy:
    name: Commit Changes and Deploy
    runs-on: ubuntu-latest
    needs: [setup-and-check, integration-testing]
    if: needs.setup-and-check.outputs.should_run == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          pattern: "*"
          merge-multiple: true

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add .
          git commit -m "🤖 Automated data update - $(date +'%Y-%m-%d')

          📊 Updated Components:
          - Raw data from HDFC mutual funds
          - Processed documents and chunks
          - Vector embeddings and search index
          - Retrieval system validation

          🔄 Update Type: ${{ needs.setup-and-check.outputs.update_type }}
          ⏰ Timestamp: $(date -u)"
          git push

      - name: Create Release Tag
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          TAG="data-update-$(date +'%Y-%m-%d')"
          git tag -a $TAG -m "Data update - $(date +'%Y-%m-%d')"
          git push origin $TAG

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Data update completed successfully!"
          echo "📈 Update type: ${{ needs.setup-and-check.outputs.update_type }}"
          echo "🕐 Completion time: $(date -u)"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Data update failed!"
          echo "🔍 Check the workflow logs for details"

  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    needs: [setup-and-check, commit-and-deploy]
    if: always()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health check
        run: |
          python scripts/health_check.py

      - name: Update status badge
        run: |
          python scripts/update_status_badge.py --status ${{ job.status }}

  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    needs: [setup-and-check]
    if: always()
    
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v6
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            
            // Keep only the latest 5 artifacts of each type
            const artifactsToDelete = artifacts.data.artifacts
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
              .slice(5);
            
            for (const artifact of artifactsToDelete) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted artifact: ${artifact.name}`);
            }
